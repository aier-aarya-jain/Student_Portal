
name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gate 1: Secret Scanning
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # Gate 2: SAST Scan
      - name: SAST Scan (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      # Gate 3: Dependency Vulnerability Scan
      - name: Dependency Scan (npm audit)
        run: npm audit --audit-level=high

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t secure-portal:latest .

      # Verify Docker Image
      - name: Verify Docker Image
        run: docker images

      # Gate 4: Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      # Gate 4: Container Image Scan
      - name: Container Image Scan
        run: |
          trivy image --severity HIGH,CRITICAL secure-portal:latest

      # Gate 5: Configuration Scan
      - name: Configuration Scan
        run: |
          trivy config .

      # Deployment Stage
      - name: Deploy Application
        if: success()
        run: |
          echo "All security gates passed."
          echo "Deploying application..."

